version: "3.8"

services:
  mongo:
    image: mongo
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: liquid
      MONGO_INITDB_ROOT_PASSWORD: 220051
    networks:
      - mongo-network

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: liquid
      ME_CONFIG_MONGODB_ADMINPASSWORD: 220051
      ME_CONFIG_MONGODB_URL: mongodb://liquid:220051@mongo:27017/
    depends_on:
      - mongo
  app:
    image: test:1.0
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    networks:
      - mongo-network

networks:
  mongo-network:
    driver: bridge
