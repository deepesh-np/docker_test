<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Management</title>
</head>
<body>
  <h1>User Management</h1>

  <h2>Add New User</h2>
  <form id="userForm">
    <div>
      <label for="email">Email</label><br />
      <input type="text" id="email" name="email" placeholder="johndoe@gmail.com" />
    </div>
    <br />
    <div>
      <label for="username">Username</label><br />
      <input type="text" id="username" name="username" placeholder="John Doe" />
    </div>
    <br />
    <div>
      <label for="password">Password</label><br />
      <input type="text" id="password" name="password" placeholder="secret" />
    </div>
    <br />
    <button type="submit">Add User</button>
  </form>

  <hr />

  <h2>All Users</h2>
  <button id="fetchBtn">Refresh Users</button>
  <ul id="usersList">
    <li>Click "Refresh Users" to load</li>
  </ul>

  <script>
    const form     = document.getElementById("userForm");
    const list     = document.getElementById("usersList");
    const fetchBtn = document.getElementById("fetchBtn");

    async function loadUsers() {
      try {
        const res   = await fetch("/getuser");
        const users = await res.json();

        if (!users.length) {
          list.innerHTML = "<li>No users found</li>";
          return;
        }

        list.innerHTML = users
          .map(u => `<li>${u.username} - ${u.email}</li>`)
          .join("");
      } catch (err) {
        alert("Failed to load users");
      }
    }

    fetchBtn.addEventListener("click", loadUsers);

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = {
        email:    form.email.value,
        username: form.username.value,
        password: form.password.value,
      };

      try {
        const res = await fetch("/adduser", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });

        const result = await res.json();
        if (!res.ok) throw new Error(result.error);

        alert("User added successfully!");
        form.reset();
        loadUsers();
      } catch (err) {
        alert(err.message || "Failed to add user");
      }
    });
  </script>
</body>
</html>
